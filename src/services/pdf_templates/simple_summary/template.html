<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{title}}</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: #111827;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      line-height: 1.45;
    }

    .document { width: 100%; }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 18px;
      text-align: center;
    }

    .meta-table {
      border-collapse: collapse;
      margin: 0 0 28px;
      width: 100%;
    }

    .meta-table td {
      border: 0;
      padding: 2px 4px 5px 0;
      vertical-align: top;
    }

    .meta-label {
      font-weight: 700;
      width: 30%;
    }

    .meta-value { width: 70%; }

    .section {
      margin: 0 0 18px;
      page-break-inside: avoid;
    }

    h2 {
      color: #111827;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 7px;
    }

    .section-body {
      margin-left: 16px;
      text-align: justify;
      text-justify: inter-word;
    }

    ul, ol {
      margin: 0;
      padding-left: 16px;
    }

    li {
      margin-bottom: 4px;
      text-align: justify;
      text-justify: inter-word;
    }

    .keywords {
      margin-left: 16px;
      word-break: break-word;
    }

  </style>
</head>
<body>
  <main class="document">
    <h1 class="title">{{title}}</h1>

    <table class="meta-table">
      <tbody>
        <tr><td class="meta-label">Generated Date</td><td class="meta-value">: {{generated_date}}</td></tr>
        <tr><td class="meta-label">Audio File</td><td class="meta-value">: {{audio_filename}}</td></tr>
        <tr><td class="meta-label">Duration</td><td class="meta-value">: {{duration}}</td></tr>
        <tr><td class="meta-label">Language</td><td class="meta-value">: {{language}}</td></tr>
      </tbody>
    </table>

    <section class="section">
      <h2>1. Summary</h2>
      <div class="section-body">{{summary}}</div>
    </section>

    <section class="section">
      <h2>2. Key Points</h2>
      <div class="section-body"><ul>{{key_points}}</ul></div>
    </section>

    <section class="section">
      <h2>3. Action Items</h2>
      <div class="section-body"><ul>{{action_items}}</ul></div>
    </section>

    <section class="section">
      <h2>4. Keywords</h2>
      <div class="keywords">{{keywords}}</div>
    </section>

  </main>
</body>
</html>
