<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    @page {
      size: A4;
      margin: 22mm 18mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #1f2937;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.6;
    }

    .document {
      width: 100%;
    }

    .header {
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid #d97706;
    }

    .label {
      color: #d97706;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    h1 {
      margin: 6px 0 12px;
      color: #111827;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      color: #4b5563;
      font-size: 11px;
    }

    .meta strong {
      color: #111827;
    }

    .summary {
      background: #fff8ed;
      border: 1px solid #f1d3a0;
      border-radius: 6px;
      margin: 18px 0;
      padding: 14px;
    }

    .section {
      margin: 18px 0;
      page-break-inside: avoid;
    }

    h2 {
      margin: 0 0 8px;
      color: #b45309;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    ul,
    ol {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    li {
      margin-bottom: 6px;
    }

    .keywords {
      color: #4b5563;
      font-size: 11px;
    }

    .footer {
      border-top: 1px solid #f1d3a0;
      color: #6b7280;
      font-size: 10px;
      margin-top: 28px;
      padding-top: 10px;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="document">
    <header class="header">
      <div class="label">Simple / Clean Summary</div>
      <h1>{{title}}</h1>
      <div class="meta">
        <strong>Date:</strong> {{date}} &nbsp; | &nbsp;
        <strong>Duration:</strong> {{duration}}
      </div>
    </header>

    <section class="summary">
      <h2>Summary</h2>
      <div>{{summary}}</div>
    </section>

    <section class="section">
      <h2>Key Points</h2>
      <ul>
        {{key_points}}
      </ul>
    </section>

    <section class="section">
      <h2>Action Items</h2>
      <ul>
        {{action_items}}
      </ul>
    </section>

    <section class="section">
      <h2>Keywords</h2>
      <div class="keywords">{{keywords}}</div>
    </section>

    <footer class="footer">Generated by Sumify AI</footer>
  </main>
</body>
</html>
